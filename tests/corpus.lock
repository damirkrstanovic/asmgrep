# asmgrep benchmark corpus — PINNED for fair, repeatable measurement.
# Each row: NAME  CLONE_URL  COMMIT_SHA   (everything after is a comment)
# Public repos only, pinned to an exact commit so the corpus is byte-identical
# for anyone. Chosen as a size + file-count + language spread: small repos are
# startup-dominated, huge ones (jdk) are scan- and page-fault-dominated.
#
# Fetch/verify with:  tests/fetch_corpus.sh          (clones missing, checks SHAs)
# Benchmark with:     tests/compare.sh   /  tests/leaderboard.sh
# Override location:  CORPUS_DIR=/path tests/fetch_corpus.sh   (default /home/damirk/src)
#
# NAME         URL                                          SHA                                        # size(src) files  lang
